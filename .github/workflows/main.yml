name: Run cucumber test

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: "25"
          cache: maven
          distribution: "temurin"


      - name: Build & Run tests
        run: mvn clean test

